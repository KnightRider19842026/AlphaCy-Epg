name: Update Alpha Cyprus EPG every 2 days

on:
  schedule:
    - cron: '0 3 */2 * *'      # Κάθε 2 μέρες στις 03:00 UTC (6:00 πρωί Κύπρου)
  workflow_dispatch:           # Μπορείς να τρέξεις χειροκίνητα

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate EPG
        run: python generate_epg.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add alpha_epg.xml
          git commit -m "Update Alpha Cyprus EPG - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
