name: Update Alpha Cyprus EPG every 2 days

on:
  schedule:
    - cron: '0 4 */2 * *'      # Κάθε 2 μέρες στις 04:00 UTC (\~07:00 Κύπρου)
  workflow_dispatch:           # Χειροκίνητη εκτέλεση

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Alpha Cyprus EPG
        run: python generate_epg.py

      - name: Commit and push updated EPG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add alpha_epg.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Alpha Cyprus EPG - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
