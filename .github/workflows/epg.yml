name: Update Alpha EPG

on:
  schedule:
    # Τρέχει στις 00:02 ώρα Κύπρου (21:02 UTC για θερινή ώρα)
    - cron: '2 21 * * *'
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις χειροκίνητα όποτε θες

jobs:
  update-epg:
    runs-on: ubuntu-latest
    # Απαραίτητο για να μπορεί το GitHub να γράψει το epg.xml πίσω στο repo σου
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run epg.py
        run: python epg.py

      - name: Commit and push epg.xml if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add epg.xml
          
          # Αν υπάρχουν αλλαγές, κάνε commit και push
          if ! git diff --staged --quiet; then
            git commit -m "Update Alpha EPG - Clean Titles"
            git push
          else
            echo "No changes in epg.xml"
          fi
